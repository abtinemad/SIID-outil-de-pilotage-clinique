<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cahier de dessin — 00 · Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600&family=Spectral:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* ── LE CADRE — :root, *, body, .tel, .tel::before : VERBATIM de 01_file_active.html ──
     Encre. Papier, encre, ardoise. Le rouge n'est nulle part sauf dans l'œil : c'est le
     sanctuaire, et l'œil est le point de nouage (§19/§20). Aucune quatrième couleur. */
  :root{
    --paper:#E9ECEF; --ink:#15191E; --red:#8E1C2B; --ink-soft:#565E66;
    --trait:rgba(21,25,30,.34);      /* le fil : il porte, il ne parle pas */
    --plein:rgba(21,25,30,.80);      /* advenu */
    --creux:rgba(21,25,30,.46);      /* attendu */
    --faint:rgba(21,25,30,.12); --ghost:rgba(21,25,30,.05);
    --prose:"Spectral",Georgia,serif;
    --slate:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --word:"Nunito","Avenir Next",system-ui,sans-serif;
    /* les deux seules variables d'app_mockup qui survivent : la page 1 n'a pas d'équivalent.
       --labelface habille les labels DU NŒUD ; --gout est la gouttière du fil de dépôts. */
    --labelface:"Spectral",Georgia,serif;
    --gout:26px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#D6DADE;color:var(--ink);font-family:var(--word);
       -webkit-font-smoothing:antialiased;display:flex;gap:36px;justify-content:center;
       align-items:flex-start;padding:40px 24px 80px;flex-wrap:wrap}

  .tel{width:390px;height:812px;background:var(--paper);position:relative;overflow:hidden;
       border-radius:34px;box-shadow:0 30px 70px rgba(0,0,0,.28),0 0 0 9px #22262b;flex:0 0 auto}
  .tel::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:6;
    background:radial-gradient(120% 90% at 50% 0%,rgba(255,255,255,.35),transparent 60%)}

  /* ── LE HEADER — .pageHead/.titreLigne/.titre/.ret : VERBATIM de la page 2 ──
     La bande reste vide : les onglets vivent sous le nœud, dans le .shell. Le header
     n'est donc que la ligne du titre. */
  .pageHead{position:absolute;top:0;left:0;right:0;z-index:5;background:var(--paper)}
  .titreLigne{position:relative;padding:24px 22px 2px}
  .titre{font-family:var(--prose);font-weight:700;font-size:22px;padding-left:38px}
  .ret{position:absolute;left:22px;top:22px;width:30px;height:30px;border-radius:15px;border:0;padding:0;
       background:rgba(255,255,255,.6);color:var(--ink-soft);cursor:pointer;
       display:flex;align-items:center;justify-content:center;transition:background .2s}
  .ret:hover{background:rgba(255,255,255,.95)}
  /* Ici il n'y a pas de retour : c'est l'entrée. Le chevron des autres pages, retourné —
     elles reviennent, celle-ci entre — et il prend la place symétrique : même .ret, même
     30px, même top:22px, mais à droite. On garde .ret en `absolute` plutôt qu'un flex
     space-between : en flux, la ligne se caserait sur les 30px du bouton, l'icône
     descendrait de 2px et la ligne du titre grandirait.
     Le .titre garde ses 38px de padding-left : il reste où il est pages 1/2/3. */
  .titreLigne .ret{left:auto;right:22px}
  /* 59px = la hauteur MESURÉE de .titreLigne seule : 24 de padding + 33 du titre + 2.
     C'est exactement les 104px des pages 1/2/3 moins les 45px de leur bande. Ce n'est pas
     100px, et on ne les force pas : là-bas le header porte titre + bande, ici la bande est
     vide. On aligne sur ce qu'il y a, pas sur le chiffre des voisines. */
  .ecran{position:absolute;top:59px;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch}

  /* ── LA BOÎTE DE CONNEXION — le mobilier de la boîte de résonance (page 2), qui est
        elle-même un .guichet. Copié verbatim : .guichet(.on)/h4, .resoDoc, .fin.
        Elle vit hors de .ecran, en enfant direct du .tel — comme #guichet et #resoBox
        page 2 : un overlay ne défile pas avec ce qu'il recouvre. ─────────────────── */
  .guichet{position:absolute;inset:0;z-index:10;background:rgba(233,236,239,.97);
           transform:translateY(101%);transition:transform .3s cubic-bezier(.2,.9,.2,1);
           display:flex;flex-direction:column;padding:26px 22px 22px}
  .guichet.on{transform:none}
  .guichet h4{font-family:var(--prose);font-weight:700;font-size:19px;margin:0 0 2px}
  #coBox{overflow-y:auto}
  .resoDoc{font-family:var(--prose);font-size:13px;line-height:1.55;color:var(--ink);margin-bottom:16px}
  .resoDoc b{font-weight:700}
  /* Les deux champs : les règles de `.sortie label` / `.sortie input[type=text]` (page 2),
     copiées telles quelles. `.sortie` elle-même ne vient pas — c'est la sortie du patient,
     elle n'a rien à faire ici ; seul son habillage de champ est repris. */
  .coChamps{margin-top:2px}
  .coChamps label{display:block;font-family:var(--prose);font-weight:700;font-size:14.5px;margin-bottom:8px}
  .coChamps input{width:100%;border:0;border-bottom:1px solid var(--faint);background:0;
    padding:7px 2px;font-family:var(--word);font-size:14px;outline:0;color:var(--ink);margin-bottom:16px}
  /* .fin : le pied du guichet — l'acte à gauche, le renoncement à droite. C'est de l'encre,
     pas du rouge : `.resoActes button.pri` est rouge parce qu'une résonance pèse sur le
     point ; entrer ne pèse sur rien. Le rouge reste au seul œil (§19/§20). */
  .fin{margin-top:auto;display:flex;gap:12px;align-items:center}
  .fin button{flex:1;height:48px;border-radius:24px;border:0;background:var(--ink);color:var(--paper);
    font-family:var(--word);font-size:14.5px;font-weight:600;cursor:pointer}
  .fin .annul{flex:0 0 auto;background:0;color:var(--ink-soft);font-weight:400;width:auto;padding:0 8px}

  #fil{stroke:var(--ink);fill:none}
  #filR{fill:var(--ink);stroke:var(--ink);stroke-width:.7;stroke-linejoin:round}
  #pt{fill:var(--red)}
  #soinN{fill:var(--red)}
  #labels text{fill:var(--ink-soft);font-family:var(--labelface);font-weight:700}

  /* ── Le shell : le nœud, toujours visible. Ce n'est pas un logo posé en en-tête —
        c'est le seul organe de navigation de l'app.
        (2026-07-15 — le cadre téléphone n'a qu'une colonne : le nœud, puis le panneau
        dessous, tout défile ensemble, comme sur les pages 1/2/3. Le nœud restait visible
        parce qu'app_mockup était en deux colonnes.) ─────────────────────────────── */
  .shell{padding:16px 22px 2px}
  #knot{width:232px;height:232px;display:block;margin:0 auto;cursor:pointer;overflow:visible;touch-action:manipulation}
  .switch{display:flex;border:1px solid var(--faint);margin:14px auto 0;width:max-content}
  /* 14px de padding latéral donnaient 364px de large pour 346 disponibles dans le cadre :
     il débordait la gouttière et `margin:auto` ne pouvait plus le centrer. 10px suffisent
     à le faire rentrer. La police ne bouge pas — les trois mots sont de doctrine. */
  .switch button{font-family:var(--slate);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    padding:10px 10px;background:transparent;border:0;color:var(--ink-soft);cursor:pointer;transition:background .25s,color .25s}
  .switch button.on{background:var(--ink);color:var(--paper)}
  /* L'air entre le switch, le tag et le hint : 36px quand la ligne .qui était là (12+6+18).
     Elle est partie avec ses 18 ; il reste 12+6, et 10+6 = 16 touche la cible. */
  .tag{font-family:var(--slate);font-size:11px;letter-spacing:.1em;color:var(--ink-soft);text-align:center;margin:10px 0 0}
  .tag b{font-weight:400;color:var(--ink)}
  .hint{font-family:var(--slate);font-size:10.5px;letter-spacing:.06em;color:var(--ink-soft);
        text-align:center;margin:6px 0 0;opacity:0;transition:opacity .5s}
  .hint.show{opacity:.75}

  /* ── Le panneau : ce que la strate, et la boucle tenue, donnent à lire. ────────── */
  /* Il était une colonne de grille (1fr) ; il est maintenant un bloc du flux de .ecran.
     Il lui faut la marge des autres pages — 22px, celle de .titreLigne et de .modes. */
  #panneau{padding:0 22px 12px}
  .rtag{font-family:var(--slate);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
        color:var(--ink-soft);margin:0 0 12px;padding-bottom:14px;border-bottom:1px solid var(--faint)}
  .rtag b{color:var(--ink);font-weight:400}
  /* La liste défile, pas la page — le motif vient de `.vigCol.defile` (page 2).
     215px est MESURÉ, pas calculé. .ecran offre 753px (812 − 59 de header) ; le reste de
     la Récolte en occupe 538. La boîte a gagné 83px sur deux reprises : 34 rendus par la
     ligne .qui (l'anonymat), 49 pris sur l'air (rtag 26→12, couv 20→10, barre 16→10,
     panneau 28→12, tag 12→10).
     Un dépôt fait 122px en moyenne : 215 en montrent 1,8 — le fil respire, il ne déroule
     pas encore. Passer à 2 ou 3 demanderait de toucher au nœud (232) : pas fait ici.

     215 était calé pour la RÉCOLTE et les trois strates en héritaient sans raison — elles
     n'ont pas les mêmes meubles sous le fil : la Récolte a le champ, la couverture et la
     barre ; les deux autres ont une note, et pas de la même taille (169px au trilobe,
     90px au bilobe). Chaque strate a donc sa mesure, et chacune est mesurée. */
  ul.fil{list-style:none;margin:0;padding:0;max-height:215px;overflow-y:auto;overscroll-behavior:contain}
  ul.fil.mMetab{max-height:176px}    /* la note du trilobe fait 169px : il ne reste que ça */
  ul.fil.mReflex{max-height:255px}   /* la note du bilobe n'en fait que 90 : 40px de plus qu'en Récolte */
  ul.fil li{position:relative;padding:0 0 30px var(--gout)}
  ul.fil li::before{content:"";position:absolute;left:2px;top:.42em;bottom:1.1em;width:1px;background:var(--faint)}
  ul.fil li.creux::before{background:none;border-left:1px dotted var(--faint)}
  .depot{margin:0;font-family:var(--prose);font-size:19px;line-height:1.62;white-space:pre-wrap;overflow-wrap:break-word}
  .attr{margin:7px 0 0;font-family:var(--slate);font-size:10.5px;letter-spacing:.09em;color:var(--ink-soft)}
  .attr a{color:var(--ink-soft);text-underline-offset:3px}
  .croise{margin-left:10px;padding-left:10px;border-left:1px solid var(--faint)}

  /* Le champ : même police, même corps, même interligne, même gouttière qu'un dépôt.
     Le mot ne change ni de forme ni de place en tombant : il gagne un nom et une heure. */
  .champ{padding-left:var(--gout)}
  textarea{display:block;width:100%;border:0;background:transparent;color:var(--ink);
    font-family:var(--prose);font-size:19px;line-height:1.62;resize:none;padding:0;
    min-height:calc(1.62em * 2);max-height:38vh;overflow-y:auto;caret-color:var(--ink)}
  textarea:focus{outline:0}
  .barre{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-top:10px;padding-left:var(--gout)}
  /* Le bouton reste vif quand le champ est vide. Un bouton grisé est une glose. */
  button#btDep{font-family:var(--slate);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;
    padding:12px 20px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;transition:background .22s,color .22s}
  button#btDep:hover{background:var(--ink);color:var(--paper)}
  /* La passe machine : ardoise. C'est un acte machine daté, jamais un dépôt. */
  .passe{font-family:var(--slate);font-size:10.5px;letter-spacing:.08em;color:var(--ink-soft);
         cursor:pointer;border-bottom:1px dotted var(--faint)}
  /* Les trois couvertures : ardoise. C'est la machine qui parle, et elle n'a aucun pouvoir. */
  .couv{display:flex;gap:26px;flex-wrap:wrap;padding-left:var(--gout);margin-top:10px}
  .mq{position:relative;font-family:var(--slate);font-size:10.5px;letter-spacing:.09em;
      color:var(--faint);cursor:default;padding-bottom:3px;border-bottom:1px solid transparent}
  .mq.on{color:var(--ink-soft);border-bottom-color:var(--faint)}
  .actes{position:absolute;left:0;top:100%;margin-top:8px;display:none;flex-direction:column;gap:6px;
         white-space:nowrap;font-weight:400;z-index:2}
  .mq:hover .actes{display:flex}
  .actes a{color:var(--ink-soft);text-decoration:none;border-bottom:1px dotted var(--faint);cursor:pointer}
  .actes a:hover{color:var(--ink)}
  .nat{margin-left:10px;padding-left:10px;border-left:1px solid var(--faint)}
  /* Sans date devant, la première marque n'a rien à séparer : pas de filet dans le vide. */
  .attr .nat:first-child{margin-left:0;padding-left:0;border-left:0}
  /* L'agrafé — .agr/.agrTxt copiés de la page 2. Le désaccord se lit SOUS son objet, en
     retrait : il s'agrafe à ce qu'il conteste, détaché il ne veut plus rien dire. */
  .agr{margin:6px 0 0 12px;border-left:2px solid var(--faint);padding:2px 0 2px 10px}
  .agrTxt{font-family:var(--prose);font-size:12px;line-height:1.42;color:#3B424A}
  /* Le récit porte plusieurs paragraphes : un <div> plutôt qu'un <p>, sinon le balisage
     est invalide. Même corps, même interligne que .depot. */
  div.depot p{margin:0 0 8px}
  div.depot p:last-child{margin:0}
  .depot.nu{color:var(--ink-soft);font-style:italic}
  ul.fil li.gest::before{border-left:1px dotted var(--faint);background:none;width:0}
  /* Les exemples poussent la note vers le bas : la Métabolisation débordait de 10px
     (763 pour 753). Le filet reste — c'est lui qui sépare ce qu'on montre de ce qu'on
     dit — mais son air passe de 24 à 14 (16+8 → 10+4). Ni le fil de la Récolte ni les
     mots de la note n'ont bougé : il n'y avait que là à prendre. */
  .note-bas{font-family:var(--slate);font-size:11px;line-height:1.8;color:var(--ink-soft);
            border-top:1px solid var(--faint);padding-top:10px;margin-top:4px}
  .note-bas b{color:var(--ink);font-weight:400}

  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
  @media (max-width:480px){ .depot,textarea{font-size:18px} :root{--gout:20px} }
</style>
</head>
<body>
<div class="tel">
  <!-- HEADER FIXE (hors scroll) — la grammaire des pages 1/2/3, et rien d'autre.
       La bande est vide : les onglets sont sous le nœud, là où ils ont toujours été. -->
  <div class="pageHead">
    <div class="titreLigne">
      <div class="titre">CONTINUUM</div>
      <!-- Le chevron des autres pages, retourné : elles reviennent, celle-ci entre.
           Aucun handler pour l'instant (étape 2). -->
      <button class="ret" id="btCo" aria-label="se connecter" title="se connecter"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
  </div>
  <div class="ecran">
  <div class="shell">
      <svg class="knot" id="knot" viewBox="0 0 420 420" role="img" aria-label="Un nœud d'un seul fil continu qui se vrille : chaque boucle se croise à sa base, le fil passe dessus-dessous.">
        <defs>
          <mask id="cut" maskUnits="userSpaceOnUse" x="-90" y="-90" width="600" height="600">
            <rect x="-90" y="-90" width="600" height="600" fill="#fff"/>
            <g id="holes"></g>
          </mask>
          <radialGradient id="ptSphere" cx="42%" cy="40%" r="66%">
            <stop offset="0%" stop-color="#A62A3A"/><stop offset="62%" stop-color="#8E1C2B"/><stop offset="100%" stop-color="#5E0F1B"/>
          </radialGradient>

  // Les textes sont ceux du prototype, mot pour mot. Seuls les auteurs sont partis : la
  // vitrine ne signe personne. Aucun de ces six textes ne nomme quelqu'un — ils disent
  // « il », « sa sœur », « au CMP », « à l'atelier ».
  var DEPOTS=[
    {t:"Le 3 mars : « toute-puissance ». Il a refusé de s’asseoir, puis s’est excusé dans le couloir."},
    {t:"Sa sœur a rappelé, depuis qu’il ne travaille plus. Elle demande si on peut passer le matin."},
    {t:"Il dit qu’il ne prend plus le traitement du soir. Il ne veut pas en parler à sa sœur."},
    {t:"Rendez-vous manqué au CMP. Il était chez lui, il n’a pas ouvert."},
    {t:"Il a parlé de son ancien poste à l’atelier. Il en parle au présent."},
    {t:"Sa sœur pleure au téléphone. Elle dit qu’elle n’en peut plus, mais qu’elle ne lâchera pas."}
  ];
  DEPOTS.forEach(function(d,i){ d.h=new Date(Date.now()-(DEPOTS.length-i)*36e5); });

  // ── Les exemples des deux autres strates ──────────────────────────────────────
  // Rien n'est inventé : les textes viennent VERBATIM de Jouve (02_intra_patient) et de
  // Filigrane (03_filigrane). L'anonymat se fait EN RETIRANT — la date seule, jamais qui :
  // ni l'auteur d'une synthèse, ni celui d'un agrafé, ni « équipe ».
  //
  // Les deux textes machine de Jouve nomment Paul. On COUPE, on ne réécrit jamais — et les
  // coupes valent POUR LA PAGE 0 SEULEMENT : la page 2 garde ses textes entiers, Paul y est
  // chez lui, elle n'est pas anonyme.
  //  · l'hypothèse perd « de Paul », rien d'autre : « Le retrait — le traitement du soir
  //    arrêté… » tient debout sans un mot changé.
  //  · le récit COMMENCE À LA DEUXIÈME PHRASE : « Il est en rupture » n'a pas d'antécédent
  //    sur la vitrine, alors on n'y touche pas. La première ligne est perdue ; aucun mot
  //    n'est réécrit.
  var EX_METAB = [
    { n:"récit", m:"proposé par la machine",
      t:"Sa sœur reste le lien principal mais dit son épuisement. Le travail apparaît au présent dans son discours — un appui qui n’est plus actif mais reste vivant. Un rendez-vous manqué récent, sans explication donnée." },
    { n:"synthèse", d:"4 juil.",
      t:"Alliance tenue par la sœur. Traitement pris. Réinvestissement possible du côté du travail à explorer. Pas d’inquiétude aiguë.",
      agr:"Je ne reconnais pas « alliance tenue ». Sa sœur tient, ce n’est pas pareil.", agrD:"5 juil." },
    { n:"hypothèse", m:"proposée par la machine, révélée après la signature",
      t:"Le retrait — le traitement du soir arrêté, le rendez-vous manqué — est-il un refus du soin, ou une manière de tenir un reste de maîtrise là où le travail et le lien lui échappent ?" },
    { n:"accompagnement", d:"4 juil.",
      t:"On accompagne le desserrage du lien fraternel sans le rompre ; on ouvre doucement le versant travail comme appui. On ne force pas le traitement du soir — on attend qu’il en reparle." }
  ];
  // Filigrane ne nomme personne : son sujet est le soignant, jamais le patient.
  // Le récit institutionnel n'a pas de date non plus : « il s'écrit tout seul, personne ne
  // le signe » (page 3). C'est un recalcul permanent, comme les propositions machine — et
  // « ce trimestre » n'était pas sa date, c'étaient ses premiers mots remontés. Sa portée
  // est restée dans sa première phrase, où elle est chez elle.
  var EX_REFLEX = [
    { n:"récit", html:
      "<p>Ce trimestre, <b>quarante-sept personnes</b> ont été suivies. On a déposé <b>mille huit cents fois</b>. "+
      "<b>Six fils</b> sont passés de main en main. On a ouvert <b>cent douze questions</b>, on en a refermé <b>vingt et une</b>.</p>"+
      "<p>Depuis le dernier point, on dépose davantage et on noue moins : <b>un dépôt sur quatre</b> est agrafé à un autre, "+
      "contre un sur trois il y a trois mois.</p>"+
      "<p>Le mot « <b>épuisement</b> » est apparu <b>neuf fois</b>, sous <b>sept plumes différentes</b>. Il n’était pas là au dernier point.</p>"+
      "<p><b>Trois gestes n’ont pas bougé depuis quatre trimestres</b> : on ne dépose presque jamais un vide d’information, "+
      "on ne tient presque jamais un écart, on ne choisit presque jamais d’attendre.</p>" },
    { n:"hypothèse", d:"il y a 2 j", t:"L’unité va bien. C’est le volume qui a changé, pas nous." },
    { n:"hypothèse", d:"il y a 2 j", t:"On a arrêté de se contredire. Ça m’inquiète plus que la charge." },
    { n:"hypothèse", m:"proposée par la machine",
      t:"On dirait que l’unité absorbe de plus en plus et relie de moins en moins. Quelque chose se dépose sans se reprendre — et les trois gestes qui demandent du temps (attendre, tenir un écart, écrire ce qu’on ne sait pas) sont ceux qui ne bougent plus. Est-ce qu’on tient encore, ou est-ce qu’on encaisse ?" },
    { n:"écart", t:"Six lectures. Aucune ne recouvre une autre." }
  ];

  // Le gabarit de la Récolte, à l'identique : le texte, puis la date et la nature. Rien
  // d'autre — pas d'auteur, donc pas de place où en mettre un.
  //
  // `d` est FACULTATIF, et son absence dit quelque chose : une proposition de la machine
  // est recalculée en permanence, elle est toujours maintenant — la dater serait mentir.
  // La mention « proposé par la machine » dit déjà ce qu'il faut. Seuls les objets signés
  // portent une date : ce sont des dépôts, ils ont eu lieu une fois.
  function filEx(items, cls){
    return '<ul class="fil '+cls+'">'+items.map(function(x){
      var corps = x.html ? '<div class="depot">'+x.html+'</div>' : '<p class="depot">'+ech(x.t)+'</p>';
      var marques = '<span class="nat">'+ech(x.n)+'</span>' + (x.m ? '<span class="nat">'+ech(x.m)+'</span>' : '');
      var agr = x.agr ? '<div class="agr"><p class="agrTxt">'+ech(x.agr)+'</p>'+
                        '<p class="attr">'+ech(x.agrD)+'<span class="nat">agrafé</span></p></div>' : '';
      return '<li><p class="attr">'+(x.d ? ech(x.d)+' ' : '')+marques+'</p>'+corps+agr+'</li>';
    }).join('')+'</ul>';
  }

  // ── Le patient nu : `?nu` ─────────────────────────────────────────────────────────
  // Ce n'est pas un mode de test, c'est l'état le plus important de l'app et le plus rare
  // à voir : personne n'a encore rien déposé. Le fil est au premier cran, les cinq boucles
  // ne portent que leur grain, et l'œil ne désigne rien — parce qu'il n'y a pas d'angle mort
  // quand tout l'est. C'est le seul écran où l'outil n'a strictement rien à dire, et c'est
  // celui qu'il faut regarder le plus longtemps.
  if(/[?&]nu\b/.test(location.search)) DEPOTS.length = 0;

  // ── La passe machine (domaine 3) ──────────────────────────────────────────────
  // Un acte machine DATÉ, jamais un dépôt. Rejouable ; le pentalobe lit la dernière.
  // Le lexique ci-dessous tient lieu du découpeur : dans l'app réelle c'est un modèle,
  // borné à la COUVERTURE (quels sujets la prose touche), jamais au sens.
  var LEX={ "Familiale":/sœur|soeur|famille|mère|père|frère/i,
            "Sociale":/ami|voisin|couloir|quelqu|téléphone/i,
            "Professionnelle":/travail|poste|atelier|emploi|chômage/i,
            "Amoureuse":/compagne|amoureu|conjoint|femme|copine/i,
            "Soi":/traitement|rendez-vous|cmp|soin|refus|excus|asseoir|ouvert|prend/i };
  var PASSE=null;

  // ── Les trois couvertures ────────────────────────────────────────────────────────
  // « Ce que tu fais · ce que tu vois · ce qu'il faudrait. » Trois marques, pas trois champs.
  //
  // `depots_grille_formulee_en_college` verrouille `situation` et `demande` sur
  // `cadre='synthese_collective'` : l'infirmier NE PEUT PAS les déposer. Un guichet à trois
  // champs produirait trois dépôts illégaux, ou une grille formulée par une main seule — et le
  // trilobe cesserait d'être un collège pour devenir un bureau. Donc : UN dépôt, TROIS lectures.
  //
  // ⚠ Ces marques ne sont PAS déterministes. Savoir si une prose a touché « la clinique » est un
  // jugement sémantique. Le lexique ci-dessous est un FIGURANT, du même statut que `LEX` : dans
  // l'app c'est un modèle, borné à la couverture, jamais au sens. Ce qui est déterministe dans
  // l'architecture d'éval, c'est la couverture STRUCTURELLE — le complément de ce qui a été
  // rangé, calculable sur des positions de caractères. Pas ceci.
  var COUV=[
    {cle:"situation", mot:"l’intervention", fig:/domicile|visite|entretien|téléphon|cmp|rendez|passé|reçu|appel/i},
    {cle:"clinique",  mot:"la clinique",    fig:/dit|refus|parl|pleur|angoiss|traitement|sommeil|mange|voix|présent/i},
    {cle:"demande",   mot:"la direction",   fig:/faudrait|revoir|coordon|hospitalis|famille|orient|reprendre|surveill/i}
  ];
  function couvertures(txt){ return COUV.map(function(c){ return c.fig.test(txt||""); }); }

  function passer(){
    var frags=[], AX=noeud.axes();   // la carte des axes vient du nœud (forme de l'instance), jamais copiée ici
    DEPOTS.forEach(function(d,di){
      if(d.n==="gestation") return;          // rien à ranger : elle est nue, et c'est un acte
      // découpage grossier en propositions — la portion la plus petite QUI GARDE LE SENS.
      var parts=d.t.split(/(?<=[.;])\s+/);
      var off=0;
      parts.forEach(function(p){
        var deb=d.t.indexOf(p,off); off=deb+p.length;
        var lobes=[];
        for(var b=0;b<5;b++){ var ax=AX[b]; if(LEX[ax] && LEX[ax].test(p)) lobes.push(b); }
        if(lobes.length) frags.push({depot:di, debut:deb, fin:off, lobes:lobes});
      });
    });
    PASSE={ calculeLe:new Date(), n:DEPOTS.length, frags:frags };
    noeud.setGrain(densitesParLobe()); rendre();
  }

  function densitesParLobe(){
    var d=[0,0,0,0,0];
    if(!PASSE) return d;
    PASSE.frags.forEach(function(f){ f.lobes.forEach(function(b){ d[b]++; }); });
    return d;
  }

  // ── La géométrie suit la matière rangée ───────────────────────────────────────
  // s_i = grain_i · (1 + k·u_i),  u_i = 1 − e^(−d_i/τ)  — u_i ne dépend QUE de d_i.
  // Pas de normalisation par le max : sinon déposer sur le travail RÉTRÉCIRAIT la
  // boucle familiale alors que rien de familial n'a bougé. Une part relative est un
  // poids relatif, et le poids est interdit (§19).
  // La saturation n'est pas un défaut : c'est « montré, jamais chiffré » tenu par la
  // courbe. Une boucle linéaire laisserait lire le compte sur le dessin ; celle-ci dit
  // « beaucoup », jamais « quatre-vingts ».

  // ── L'épaisseur du fil : quatre crans francs, jamais une courbe ───────────────
  // « rien · pas assez · il y en a · le dossier est fourni ». Un saut visible entre chaque :
  // on ne lit pas un volume, on lit un ÉTAT. Une courbe laisserait compter sur le dessin.
  //
  // Elle ne rétrécit JAMAIS : les dépôts sont append-only, le fil hérite de l'invariant 1.
  // Elle ne se lit pas de la passe : au dépôt le fil épaissit et AUCUNE boucle ne bouge.
  // « On sait davantage, on ne l'a pas encore rangé. » Le Goodhart meurt là : on ne peut
  // pas engraisser une boucle en écrivant.
  //
  // Le quatrième cran n'appartient PAS à la récolte. Un dossier « fourni » n'est pas un dossier
  // gros : c'est un dossier métabolisé. À cinq boucles le fil sature donc au troisième cran,
  // quel que soit le nombre de dépôts. La quantité ne peut pas se faire passer pour du travail.
  var CRANS = [5, 8, 11, 14];             // rien · pas assez · il y en a · fourni
  var SEUILS = [1, 4, 12];                // dépôts requis pour monter d'un cran
  function cranRecolte(){
    var n=DEPOTS.length, c=0;
    for(var i=0;i<SEUILS.length;i++) if(n>=SEUILS[i]) c=i+1;
    return Math.min(c, 2);                // plafond récolte : le 4e cran se gagne au trilobe
  }
  function majFil(){ noeud.setEpaisseur(CRANS[cranRecolte()]); }

  // ── Le panneau ────────────────────────────────────────────────────────────────
  var HEURE=new Intl.DateTimeFormat("fr-FR",{day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"});
  function quand(d){ return HEURE.format(d).replace(":"," h "); }
  function ech(s){ var e=document.createElement("i"); e.textContent=s; return e.innerHTML; }

  // Le panneau lit `targetS`, non `currentS` : la strate est décidée au clic, la forme
  // met une seconde à s'y rendre. Le morph est le voyage, pas la décision.
  // ── La péremption est arithmétique, pas décidée ───────────────────────────────
  // Le condensé porte le nombre de dépôts dont il est issu. Un dépôt tombe → périmé, par
  // construction. Personne ne relance. (Chez LeCLG : `_n === n`. Chez nous le compte est
  // MONOTONE — append-only — donc c'est une clé de péremption parfaite, pas une heuristique.)
  //
  // Et personne ne PAIE le recalcul à la récolte : le rangement appartient à la métabolisation.
  // L'infirmier ne déclenche jamais un acte machine. Ouvrir le trilobe, c'est payer la passe.
  function retardTexte(){
    if(!PASSE) return 'rien n’a encore été rangé';
    var d=DEPOTS.length-PASSE.n;
    return 'rangé sur '+PASSE.n+' dépôt'+(PASSE.n>1?'s':'')+(d>0? ' · '+d+' de plus depuis' : '');
  }
  function retard(){ return '<span class="passe" title="le rangement se recalcule au trilobe">'+retardTexte()+'</span>'; }
  function passePerimee(){ return !PASSE || PASSE.n !== DEPOTS.length; }

  function rendre(){
    var s=STRATE, pan=$("panneau");
    majFil();

    if(s===2 && HELD<0){                                // ── LE NŒUD : on écrit ──
      var fl=DEPOTS.map(function(d){
        // La gestation est la seule nature autorisée à n'avoir aucun contenu
        // (`depots_contenu_sauf_gestation`). Elle ne s'affiche pas comme un dépôt raté :
        // elle s'affiche comme un acte. « Personne n'a jamais mal rempli un champ qu'il avait
        // le droit de laisser en gestation. »
        var corps = d.n==="gestation"
          ? '<p class="depot nu">ça travaille — '+ech(motDe(d.c))+'</p>'
          : '<p class="depot">'+ech(d.t)+'</p>';
        var typ = (d.n && d.n!=="observation") ? '<span class="nat">'+ech(d.n)+'</span>' : '';
        return '<li'+(d.n==="gestation"?' class="gest"':'')+'>'+corps+
               // La date seule, sans auteur — comme les hypothèses de Filigrane. Pas
               // « anonyme » : ça ferait une colonne de « anonyme · anonyme · anonyme ».
               '<p class="attr">'+quand(d.h)+' '+typ+'</p></li>';
      }).join("");
      pan.innerHTML =
        '<p class="rtag">Récolte · le nœud · <b>on écrit ici</b></p>'+
        '<ul class="fil">'+fl+'</ul>'+
        // AMORCE, non glose (§8). Elle n'explique pas le champ — elle ouvre le geste.
        // « Le jour où un champ a besoin d'un texte d'aide pour être compris, c'est le champ
        // qui est mal fait » vise la GLOSE. « L'indice ouvre un geste » autorise ceci.
        '<div class="champ"><textarea id="txt" rows="2" aria-label="Observation" '+
          'placeholder="Ce qui a été vu, entendu, rapporté"></textarea></div>'+
        '<div class="couv" id="couv"></div>'+
        '<div class="barre">'+retard()+'<button id="btDep">Déposer</button></div>';
      var txt=$("txt");
      txt.value=BROUILLON;
      majCouv();
      txt.addEventListener("input",function(){
        BROUILLON=txt.value;
        txt.style.height="auto"; txt.style.height=txt.scrollHeight+"px";
        majCouv();   // la marque suit la prose. Elle ne la corrige pas, ne la complète pas,
      });            // n'écrit jamais dans le champ, et ne conditionne jamais le bouton.
      $("btDep").addEventListener("click",function(){
        // Le refus : le champ vide ne rejoint pas le fil. Rien ne l'explique.
        if(!/\S/.test(txt.value)){ txt.focus(); return; }
        DEPOTS.push({a:QUI, n:"observation", t:txt.value, h:new Date()});
        BROUILLON="";                        // signé : la prose quitte l'écran pour le fil
        rendre(); $("txt").focus();
        // Aucune boucle ne bouge. La passe n'a pas tourné.
      });
      // Pas de focus ici : `rendre()` tourne aussi à l'ouverture, et le focus y faisait
      // défiler .ecran jusqu'au champ — le nœud sortait du cadre avant qu'on l'ait vu.
      // Le focus appartient au DÉPÔT (on continue d'écrire), pas au rendu : il est posé
      // sur chacun des trois gestes qui déposent, jamais ici.

      // Le fil est une chronologie et les dépôts s'ajoutent en queue : on ouvre EN BAS,
      // sur le dernier, comme on arrive dans une conversation. `scrollTop` sur la boîte
      // ne touche pas .ecran — c'est un défilement interne, pas un scrollIntoView (le
      // piège du focus). Seule la boîte des dépôts est concernée : la liste d'une boucle
      // tenue se lit, elle ne s'écrit pas, elle reste en tête.
      var ul=pan.querySelector("ul.fil"); if(ul) ul.scrollTop=ul.scrollHeight;
      return;
    }

    if(s===2){                                          // ── UNE BOUCLE TENUE : on lit ──
      var b=HELD, ax=HELDAXE, AX=noeud.axes();
      var fr=(PASSE? PASSE.frags.filter(function(f){ return f.lobes.indexOf(b)>=0; }) : []);
      var corps = fr.length
        ? fr.map(function(f){ var d=DEPOTS[f.depot];
            var croise=f.lobes.length>1 ? '<span class="croise">croise '+f.lobes.filter(function(x){return x!==b;}).map(function(x){return AX[x];}).join(" · ")+'</span>' : '';
            return '<li><p class="depot">'+ech(d.t.slice(f.debut,f.fin))+'</p>'+
                   // Second endroit où l'auteur s'affichait : le panneau « on lit » d'une
                   // boucle tenue. Même fuite, même page — la date seule ici aussi.
                   '<p class="attr">'+quand(d.h)+' · <a href="#" class="note">la note entière</a> '+croise+'</p></li>';
          }).join("")
        : '<li class="creux"><p class="depot">—</p><p class="attr">'+(PASSE?'rien n’a été rangé ici':'la lecture machine n’a pas tourné')+'</p></li>';
      pan.innerHTML =
        '<p class="rtag">Récolte · boucle <b>'+ax+'</b> · on lit, on n’écrit pas ici</p>'+
        '<ul class="fil">'+corps+'</ul>'+
        '<div class="note-bas">'+retardTexte()+'. La portion est citée ; le dépôt reste entier, à un clic. '+
        'Un fragment sur deux axes est <b>un</b> croisement, non deux cases cochées.</div>';
      return;
    }

    if(s===1){
      // La note doctrinale reste EN DESSOUS des exemples : on montre, puis on dit.
      // (2026-07-15, Abtine) La dernière phrase mélangeait le trilobe et la Vigilante :
      // « ne se dépose jamais SEUL » dit qu'on dépose, en collège — ce n'est pas « aucun
      // guichet ». L'écran de la page 2 le confirme : Synthèse, Hypothèse et
      // Accompagnement ont chacun le leur ; la Vigilance est la seule à n'en avoir aucun.
      // Le reste de la note est intact.
      pan.innerHTML='<p class="rtag">Métabolisation · trilobe</p>'+
        filEx(EX_METAB,"mMetab")+
        '<div class="note-bas">Affectif et Réflexif <b>composent</b> ; la Vigilante <b>lit</b> — deux lobes composent, un seul lit. '+
        'Entre dans un lobe : l’œil saute la corde. Dans la Vigilante il chausse la lentille. '+
        'Ce qui se <i>formule</i> ne se dépose jamais seul : on noue et on signe en collège. '+
        'Seule la Vigilante n’a aucun guichet — on la lit, on n’y dépose pas ; c’est ce qui lui donne le droit de parler.</div>';
      return;
    }
    // (2026-07-15, Abtine) Deux périmés levés dans cette note :
    //  · « montré jamais chiffré » : la garde est levée au bilobe — le nombre est permis
    //    sur l'agrégat anonyme, il n'y a plus personne dedans ; l'interdit porte sur la
    //    personne.
    //  · « se tient au centre » : l'œil se balade sur le fil depuis le chantier du 15/07.
    // Le reste de la note est intact.
    pan.innerHTML='<p class="rtag">Réflexivité · l’infini</p>'+
      filEx(EX_REFLEX,"mReflex")+
      '<div class="note-bas">Continuité et Fragmentation — les deux faces d’une même présence. '+
      'L’œil veille : sentinelle, non lecteur. Agrégat anonyme : aucun nombre sur quelqu’un, '+
      'mais on peut compter notre trace.</div>';
  }

  // La prose en cours n'est pas un dépôt — mais elle n'est pas rien non plus. Déposer un doute
  // (`gestation`) ne doit pas effacer ce qu'on était en train d'écrire. Le brouillon vit dans
  // l'écran, jamais dans la base : « rien n'est déposé tant qu'il n'a pas signé. »
  var BROUILLON="";

  function motDe(cle){ for(var i=0;i<COUV.length;i++) if(COUV[i].cle===cle) return COUV[i].mot; return cle; }

  // Les marques s'allument, et n'ont AUCUN pouvoir. Le bouton n'est jamais grisé par elles :
  // une couverture qui conditionne le dépôt, c'est la machine qui dicte quand une observation
  // est complète. Elle montre. Elle ne conclut pas, et elle n'empêche pas.
  function majCouv(){
    var zone=$("couv"); if(!zone) return;
    var t=$("txt")?$("txt").value:"", etats=couvertures(t);
    zone.innerHTML = COUV.map(function(c,i){
      return '<span class="mq'+(etats[i]?' on':'')+'" data-i="'+i+'">'+c.mot+
             '<b class="actes"><a data-a="rien" data-i="'+i+'">j’ai regardé, rien</a>'+
             '<a data-a="gest" data-i="'+i+'">ça travaille</a></b></span>';
    }).join("");
    zone.querySelectorAll("a").forEach(function(a){
      a.addEventListener("click", function(e){
        e.preventDefault();
        var c=COUV[+a.dataset.i].cle, tx=$("txt");
        if(a.dataset.a==="gest"){
          // La seule nature qui reste NUE. Aucun texte demandé, aucun texte pris.
          DEPOTS.push({a:QUI, n:"gestation", c:c, t:"", h:new Date()});
        } else {
          // `vide_info` porte un contenu : « j'ai regardé, il n'y avait rien » est un FAIT,
          // il se dit. Le champ vide reste refusé — un fait ne se dépose pas en blanc.
          if(!/\S/.test(tx.value)){ tx.focus(); return; }
          DEPOTS.push({a:QUI, n:"vide_info", c:c, t:tx.value, h:new Date()});
          BROUILLON="";
        }
        rendre(); $("txt").focus();   // déposé aussi : le champ reprend la main
      });
    });
  }

  // ── La boîte de connexion ─────────────────────────────────────────────────────
  // Même mécanique que la résonance (page 2) : la classe `on` glisse le bottom-sheet.
  // Rien ne vérifie rien — les deux champs sont inertes, « entrer » ouvre la file active.
  $("btCo").addEventListener("click", function(){ $("coBox").classList.add("on"); });
  $("coFermer").addEventListener("click", function(){ $("coBox").classList.remove("on"); });
  $("coEntrer").addEventListener("click", function(){ location.href="01_file_active.html"; });

  // ── Qui écrit ─────────────────────────────────────────────────────────────────
  // Personne, sur la vitrine. Le sélecteur de prénom appartenait au prototype interne, où
  // l'on choisissait qui écrit pour tester ; QUI ne se lit donc plus dans le DOM — il n'y
  // a plus de DOM à lire. C'est une constante, et elle est nulle : le dépôt garde sa place
  // dans le fil et son heure, il n'est simplement signé de personne. `a` reste dans la
  // forme du dépôt (l'app réelle signe — invariant 1) ; ici il ne porte rien, et rien
  // ne l'affiche.
  var QUI=null;

  // ── Le nœud (module) et son câblage à la page ──────────────────────────────────
  // La page ne dessine plus le nœud : elle l'instancie, le pilote (setStrate/setGrain),
  // et écoute ses événements. La strate change la forme (nœud) ET le panneau (page).
  setRed(0.85); setInk(0.36);
  var STRATE=2, HELD=-1, HELDAXE=null;
  var noeud = creerNoeud(knotSvg);

  // #tag/#hint suivent le lobe courant, émis par le nœud pendant le morph (jamais un id de page dans le module)
  noeud.onStrateChange(function(s, lc, ctx){
    tag.innerHTML='<b>'+lc+' boucle'+(lc>1?'s':'')+'</b> — '+ctx;
    hint.className=(lc>=5?"hint show":"hint");
  });
  // clic sur une boucle : le nœud tient l'œil et NOTIFIE la page de l'axe tenu (pour le panneau « on lit »)
  noeud.onLobe(function(b, axe){ HELD=b; HELDAXE=axe; rendre(); });

  // la strate décide la forme (nœud) ET le panneau (page), d'un seul geste
  function changerStrate(s){
    STRATE=s; HELD=-1; HELDAXE=null;
    noeud.setStrate(s);
    switchBtns.forEach(function(b){ b.classList.toggle("on",(+b.dataset.s)===s); });
    frames.forEach(function(f){ f.classList.toggle("on",(+f.dataset.f)===s); });
    // Ouvrir la métabolisation paie le recalcul (seul déclencheur, humain sans être un verdict).
    if(s===1 && passePerimee()) passer();
    rendre();
  }
  switchBtns.forEach(function(b){ b.addEventListener("click",function(){ changerStrate(+b.dataset.s); }); });

  changerStrate(2); rendre();
})();

</script>
</body>
